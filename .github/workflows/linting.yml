name: Automated Linting

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Show repo layout
        run: |
          echo "Working directory: $(pwd)"
          echo "--- Top-level files and directories ---"
          ls -la
          echo "--- frontend directory (if present) ---"
          ls -la frontend || true
          echo "--- backend directory (if present) ---"
          ls -la backend || true
          echo "--- directories (depth 2) ---"
          find . -maxdepth 2 -type d -print

      - name: Lint Backend (if present)
        run: |
          if [ -d backend ]; then
            echo "Found 'backend' directory — running: flake8 backend"
            flake8 backend
          else
            echo "Directory 'backend' not found. Running flake8 on repository root instead."
            flake8 .
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install Frontend Packages
        working-directory: frontend
        run: npm ci

      - name: Lint Frontend
        working-directory: frontend
        run: npm run lint
